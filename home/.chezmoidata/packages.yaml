# Declarative package manifest. Consumed by
# run_onchange_before_20-brew-bundle.sh.tmpl to generate a Brewfile on the
# fly. Re-apply (`chezmoi apply`) reruns brew bundle whenever the rendered
# Brewfile changes.
#
# Structure:
#   packages.common             – brews installed on every platform
#   packages.linux              – extra brews on Linux
#   packages.darwin.base        – macOS brews/casks installed unconditionally
#   packages.darwin.desktop     – extra apps on desktop workstations
#   packages.darwin.virt        – UTM virtualization
#   packages.darwin.socials     – Telegram + WhatsApp
#   packages.darwin.laptop      – laptop-only (Tailscale)
#   packages.darwin.work        – work apps (Slack)
#   packages.darwin.personal    – personal apps (Bambu Studio, KiCad)
#
# Each bucket can carry the keys `brews`, `casks`, and `mas`. `mas` entries
# are objects with `name` and `id` fields.

packages:
  common:
    brews:
      - eza
      - fd
      - fzf
      - gh
      - git-lfs
      - glab
      - httpie
      - jq
      - ripgrep
      - starship
      - tea
      - uv
      - zoxide

  linux:
    brews:
      - btop
      - claude-code
      - vim

  darwin:
    base:
      brews:
        - dockutil
      casks:
        - appcleaner
        - claude
        - claude-code
        - ghostty
        - google-chrome
        - logseq

    desktop:
      brews:
        - container
      casks:
        - docker-desktop
        - logi-options+
        - zed
      mas:
        - { name: "Flighty – Live Flight Tracker", id: 1358823008 }
        - { name: "Numbers",                        id: 409203825 }
        - { name: "Pages",                          id: 409201541 }

    virt:
      casks:
        - utm

    socials:
      mas:
        - { name: "Telegram",           id: 747648890 }
        - { name: "WhatsApp Messenger", id: 310633997 }

    laptop:
      mas:
        - { name: "Tailscale", id: 1475387142 }

    work:
      mas:
        - { name: "Slack for Desktop", id: 803453959 }

    personal:
      casks:
        - bambu-studio
        - kicad
