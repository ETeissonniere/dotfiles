# Declarative package manifest consumed by run_onchange_before_20-brew-bundle.
# Buckets under `packages.darwin.*` are gated on the matching chezmoi toggle
# (see .chezmoi.toml.tmpl). Each bucket may carry `brews`, `casks`, and `mas`
# (objects with `name` and `id`).
packages:
  common:
    brews:
      - eza
      - fd
      - fzf
      - gh
      - git-lfs
      - glab
      - httpie
      - jq
      - ripgrep
      - starship
      - tea
      - uv
      - zoxide

  linux:
    brews:
      - btop
      - claude-code
      - vim

  darwin:
    base:
      brews:
        - dockutil
      casks:
        - appcleaner
        - claude
        - claude-code
        - ghostty
        - google-chrome
        - logseq

    desktop:
      brews:
        - container
      casks:
        - docker-desktop
        - logi-options+
        - zed
      mas:
        - { name: "Flighty – Live Flight Tracker", id: 1358823008 }
        - { name: "Numbers",                        id: 409203825 }
        - { name: "Pages",                          id: 409201541 }

    virt:
      casks:
        - utm

    socials:
      mas:
        - { name: "Telegram",           id: 747648890 }
        - { name: "WhatsApp Messenger", id: 310633997 }

    laptop:
      mas:
        - { name: "Tailscale", id: 1475387142 }

    work:
      mas:
        - { name: "Slack for Desktop", id: 803453959 }

    personal:
      casks:
        - bambu-studio
        - kicad
