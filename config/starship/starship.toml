# Starship prompt — Ayu Mirage palette

format = """$hostname$directory$git_branch$git_state$git_status$cmd_duration$character"""

[hostname]
format = "[\\[](#8a9199)[ remote ](#242936 bg:#f28779)[\\]](#8a9199) "
ssh_only = true

[directory]
format = "[$path]($style) "
style = "#73d0ff"
truncation_length = 2

[git_branch]
format = "[$symbol$branch]($style) "
style = "#d5ff80"
symbol = ""

[git_state]
format = "[$state( $progress_current/$progress_total)]($style) "
style = "bold #f28779"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "#f28779"

[cmd_duration]
format = "took [$duration]($style) "
style = "#8a9199"
min_time = 2000

[character]
success_symbol = "[→](bold #d5ff80)"
error_symbol = "[→](bold #f28779)"

