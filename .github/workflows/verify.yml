name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck and chezmoi
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y shellcheck
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Shellcheck tracked .sh files
        run: |
          mapfile -t files < <(git ls-files '*.sh' | grep -vE 'modules/(zsh|tmux)' || true)
          [[ ${#files[@]} -gt 0 ]] && shellcheck -x "${files[@]}"

      - name: Render chezmoi templates (smoke test)
        run: |
          # Auto-extract every promptBoolOnce/promptStringOnce key and pass a
          # synthetic default so execute-template doesn't try to open a TTY.
          args=(--init)
          while IFS= read -r k; do args+=(--promptBool "$k=false"); done \
            < <(grep -oE 'promptBoolOnce \. "[^"]+"' home/.chezmoi.toml.tmpl | awk -F'"' '{print $2}' | sort -u)
          while IFS= read -r k; do args+=(--promptString "$k=ci"); done \
            < <(grep -oE 'promptStringOnce \. "[^"]+"' home/.chezmoi.toml.tmpl | awk -F'"' '{print $2}' | sort -u)
          chezmoi execute-template "${args[@]}" < home/.chezmoi.toml.tmpl > /dev/null
